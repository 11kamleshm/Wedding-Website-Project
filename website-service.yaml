apiVersion: v1
kind: Service
metadata:
  name: website-service
spec:
  type: NodePort
  selector:
    app: website # Ensure this label matches the 'app' label in your Deployment's template
  ports:
    - port: 80
      targetPort: 80
      nodePort: 3007 # Access your website on your Minikube IP at port 3007
